name: Deploy mztradingparquetfiles to CF

on:
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
    - uses: actions/checkout@v6
    - name: Setup Deno
      uses: denoland/setup-deno@v2
      with:
        deno-version: v2.x
    - name: Build dist
      run: |
        deno run --allow-all jobs/build-parquet-files/parquet-files.tsx
    - name: Deploy
      uses: cloudflare/wrangler-action@v4
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        command: deploy --assets dist --name mztradingparquetfiles --compatibility-date 2026-07-10
